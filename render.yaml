services:
  - type: web
    name: emotionlens-api
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FRONTEND_ORIGIN
        value: https://your-vercel-app.vercel.app
      - key: PYTHON_VERSION
        value: "3.11"
